name: Node.js CI/CD && Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1️⃣ Code-г checkout хийх
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3️⃣ Dependencies install
      - name: Install dependencies
        run: npm install
      
      # 4️⃣ Docker Hub login
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Docker image build & push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/laundry:latest

      # 6️⃣ Deploy via SSH to AWS EC2
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          port: 22
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/laundry:latest
            docker stop laundry || true
            docker rm laundry || true
            docker run -d --name laundry --restart always -p 4000:4000 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e MONGO_URL="${{ secrets.MONGO_URL }}" \
              ${{ secrets.DOCKER_USERNAME }}/laundry:latest